name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libdrm-dev libgbm-dev libegl-dev libgl-dev \
            puredata-dev

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          git clone --depth 1 https://github.com/pure-data/pure-data.git deps/pd-headers

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            git
            unzip
            curl
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils

      - name: Download Pd and GEM (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          curl -sL -o pd-msw.zip "http://msp.ucsd.edu/Software/pd-0.56-2.msw.zip"
          unzip -q pd-msw.zip
          curl -sL -o gem-win.dek "https://puredata.info/downloads/gem/releases/0.94/Gem%5Bv0.94%5D%28Windows-amd64-32%29.dek"
          unzip -q gem-win.dek

      - name: Prepare GEM headers
        if: runner.os != 'Windows'
        run: |
          git clone --depth 1 https://github.com/umlaeute/Gem.git deps/gem-headers
          cat > deps/gem-headers/src/Gem/GemGLconfig.h << 'EOF'
          #ifndef _GEM_GL_CONFIG_H_
          #define _GEM_GL_CONFIG_H_
          /* #undef GEM_MULTICONTEXT */
          /* #undef GEM_HAVE_GLU */
          #endif
          EOF

      - name: Prepare headers and verify DLLs (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/umlaeute/Gem.git deps/gem-headers
          cat > deps/gem-headers/src/Gem/GemGLconfig.h << 'EOF'
          #ifndef _GEM_GL_CONFIG_H_
          #define _GEM_GL_CONFIG_H_
          /* #undef GEM_MULTICONTEXT */
          /* #undef GEM_HAVE_GLU */
          #endif
          EOF
          git clone --depth 1 https://github.com/pure-data/pure-data.git deps/pd-headers
          echo "Pd DLL: $(ls pd-0.56-2/bin/pd.dll)"
          echo "Gem DLL: $(ls Gem/Gem.dll)"

      - name: Build (non-Windows)
        if: runner.os != 'Windows'
        run: |
          ARGS="GEM_DIR=deps/gem-headers"
          if [ "$(uname -s)" = "Darwin" ]; then
            ARGS="$ARGS PD_DIR=deps/pd-headers"
          fi
          make $ARGS

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          make GEM_DIR=deps/gem-headers PD_DIR=deps/pd-headers \
            PD_DLL_PATH="$(pwd)/pd-0.56-2/bin/pd.dll"

      - name: Verify build artifacts (non-Windows)
        if: runner.os != 'Windows'
        run: ls -la .build/*.pd_* 2>/dev/null || ls -la .build/*.pd_linux 2>/dev/null || echo "No externals found"

      - name: Verify build artifacts (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: ls -la .build/*.dll 2>/dev/null || echo "No externals found"
