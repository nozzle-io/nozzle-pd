name: CI

on:
  push:
    branches: [main, stable]
    tags: ['v*']
  pull_request:
    branches: [main, stable]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' && github.event_name != 'release' }}

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
      fail-fast: false
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libdrm-dev libgbm-dev libegl-dev libgl-dev \
            puredata-dev \
            zip unzip

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          git clone --depth 1 https://github.com/pure-data/pure-data.git deps/pd-headers

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: UCRT64
          update: true
          install: >-
            make
            git
            zip
            unzip
            curl
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-binutils

      - name: Download Pd and GEM (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          curl -sL -o pd-msw.zip "http://msp.ucsd.edu/Software/pd-0.56-2.msw.zip"
          unzip -q pd-msw.zip
          curl -sL -o gem-win.dek "https://puredata.info/downloads/gem/releases/0.94/Gem%5Bv0.94%5D%28Windows-amd64-32%29.dek"
          unzip -q gem-win.dek

      - name: Prepare GEM headers
        if: runner.os != 'Windows'
        run: |
          git clone --depth 1 https://github.com/umlaeute/Gem.git deps/gem-headers
          cat > deps/gem-headers/src/Gem/GemGLconfig.h << 'EOF'
          #ifndef _GEM_GL_CONFIG_H_
          #define _GEM_GL_CONFIG_H_
          /* #undef GEM_MULTICONTEXT */
          /* #undef GEM_HAVE_GLU */
          #endif
          EOF

      - name: Prepare headers and verify DLLs (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          git clone --depth 1 https://github.com/umlaeute/Gem.git deps/gem-headers
          cat > deps/gem-headers/src/Gem/GemGLconfig.h << 'EOF'
          #ifndef _GEM_GL_CONFIG_H_
          #define _GEM_GL_CONFIG_H_
          /* #undef GEM_MULTICONTEXT */
          /* #undef GEM_HAVE_GLU */
          #endif
          EOF
          git clone --depth 1 https://github.com/pure-data/pure-data.git deps/pd-headers
          echo "Pd DLL: $(ls pd-0.56-2/bin/pd.dll)"
          echo "Gem DLL: $(ls Gem/Gem.dll)"

      - name: Build (non-Windows)
        if: runner.os != 'Windows'
        run: |
          ARGS="GEM_DIR=deps/gem-headers"
          if [ "$(uname -s)" = "Darwin" ]; then
            ARGS="$ARGS PD_DIR=deps/pd-headers"
          fi
          make $ARGS

      - name: Build (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          make GEM_DIR=deps/gem-headers PD_DIR=deps/pd-headers \
            PD_DLL_PATH="$(pwd)/pd-0.56-2/bin/pd.dll"

      - name: Verify build artifacts
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            ext=".pd_darwin"
          elif [ "$RUNNER_OS" = "Linux" ]; then
            ext=".pd_linux"
          else
            ext=".dll"
          fi
          for name in pix_nozzle_send pix_nozzle_receive pix_nozzle_gl_send pix_nozzle_gl_receive; do
            file=".build/${name}${ext}"
            if [ ! -f "$file" ]; then
              echo "ERROR: Missing $file"
              exit 1
            fi
            ls -la "$file"
          done
          echo "All 4 externals verified"

      - name: Prepare package metadata
        id: meta
        shell: bash
        run: |
          repo="${{ github.event.repository.name }}"
          short_sha="${GITHUB_SHA::7}"
          if [ "$RUNNER_OS" = "macOS" ]; then
            platform="macos"
          elif [ "$RUNNER_OS" = "Linux" ]; then
            platform="linux"
          else
            platform="windows"
          fi

          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            base="${repo}-${GITHUB_REF_NAME}-${platform}"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            base="${repo}-latest-${short_sha}-${platform}"
          elif [[ "${GITHUB_REF}" == refs/heads/stable ]]; then
            base="${repo}-stable-${short_sha}-${platform}"
          else
            base="${repo}-ci-${short_sha}-${platform}"
          fi

          echo "platform=${platform}" >> "$GITHUB_OUTPUT"
          echo "package_root=${base}" >> "$GITHUB_OUTPUT"
          echo "package_name=${base}.zip" >> "$GITHUB_OUTPUT"

      - name: Package release zip (non-Windows)
        if: runner.os != 'Windows'
        run: |
          scripts/package-release.sh \
            "${{ steps.meta.outputs.platform }}" \
            "${{ steps.meta.outputs.package_name }}" \
            "${{ steps.meta.outputs.package_root }}"

      - name: Package release zip (Windows)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: |
          scripts/package-release.sh \
            "${{ steps.meta.outputs.platform }}" \
            "${{ steps.meta.outputs.package_name }}" \
            "${{ steps.meta.outputs.package_root }}"

      - name: Upload release package artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_root }}
          path: ${{ steps.meta.outputs.package_name }}

  release:
    needs: [build]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Verify downloaded packages
        run: |
          packages=()
          while IFS= read -r package; do
            packages+=("$package")
          done < <(find release-artifacts -type f -name '*.zip' | sort)

          if [ "${#packages[@]}" -ne 3 ]; then
            printf 'expected 3 release zips, found %s\n' "${#packages[@]}" >&2
            printf '%s\n' "${packages[@]}"
            exit 1
          fi

          for package in "${packages[@]}"; do
            base="$(basename "$package" .zip)"
            case "$base" in
              *-macos) ext=".pd_darwin" ;;
              *-linux) ext=".pd_linux" ;;
              *-windows) ext=".dll" ;;
              *) echo "unknown package platform: $base" >&2; exit 1 ;;
            esac

            unzip -l "$package" > "${package}.contents.txt"
            for name in pix_nozzle_send pix_nozzle_receive pix_nozzle_gl_send pix_nozzle_gl_receive; do
              grep -F "${base}/${name}${ext}" "${package}.contents.txt"
            done
            for patch in pix_nozzle_send-help.pd pix_nozzle_receive-help.pd pix_nozzle_gl_send-help.pd pix_nozzle_gl_receive-help.pd; do
              grep -F "${base}/${patch}" "${package}.contents.txt"
            done
            grep -F "${base}/README.md" "${package}.contents.txt"
            printf '%s\n' "$package" >> packages.txt
          done

      - name: Delete old latest release
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view latest --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release delete latest --yes --repo "${GITHUB_REPOSITORY}"
          else
            echo "No existing latest release to delete"
          fi

      - name: Check versioned release asset does not exist
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' > existing-assets.txt 2>/dev/null; then
            while IFS= read -r package; do
              asset="$(basename "$package")"
              if grep -Fx "$asset" existing-assets.txt; then
                echo "versioned release asset already exists: $asset" >&2
                exit 1
              fi
            done < packages.txt
          else
            echo "No existing release for ${GITHUB_REF_NAME}; create step will create it."
          fi

      - name: Create or update release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          packages=()
          while IFS= read -r package; do
            packages+=("$package")
          done < packages.txt

          if [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            gh release create latest "${packages[@]}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "Latest development snapshot" \
              --prerelease \
              --notes "Development snapshot from main. Commit: ${GITHUB_SHA}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            if gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
              gh release upload "${GITHUB_REF_NAME}" "${packages[@]}" --repo "${GITHUB_REPOSITORY}"
            else
              gh release create "${GITHUB_REF_NAME}" "${packages[@]}" \
                --repo "${GITHUB_REPOSITORY}" \
                --title "${GITHUB_REF_NAME}" \
                --notes "Release ${GITHUB_REF_NAME}"
            fi
          else
            echo "unsupported release ref: ${GITHUB_REF}" >&2
            exit 1
          fi
